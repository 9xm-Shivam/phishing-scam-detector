<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhishGuard AI — Phishing & Scam Detector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #050a0f;
      --bg2:        #091420;
      --panel:      #0d1f2d;
      --border:     #1a3a50;
      --accent:     #00d4ff;
      --accent2:    #00ff88;
      --danger:     #ff3860;
      --warn:       #ffdd57;
      --text:       #cde8f5;
      --muted:      #4a7a9b;
      --font-mono:  'Share Tech Mono', monospace;
      --font-ui:    'Syne', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Grid noise background ─────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ───────────────────────────────────────────────────── */
    header {
      position: relative; z-index: 10;
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(5,10,15,.9);
      backdrop-filter: blur(12px);
    }

    .logo {
      display: flex; align-items: center; gap: .75rem;
      font-size: 1.35rem; font-weight: 800; letter-spacing: -.5px;
    }
    .logo span.accent { color: var(--accent); }
    .logo-icon {
      width: 36px; height: 36px; border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: grid; place-items: center; font-size: 1.1rem;
    }

    .status-pill {
      font-family: var(--font-mono);
      font-size: .72rem; padding: .3rem .8rem;
      border: 1px solid var(--accent2);
      border-radius: 50px; color: var(--accent2);
      display: flex; align-items: center; gap: .4rem;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent2);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: .3; }
    }

    /* ── Hero ─────────────────────────────────────────────────────── */
    .hero {
      position: relative; z-index: 5;
      text-align: center; padding: 4rem 2rem 2rem;
    }
    .hero-tag {
      font-family: var(--font-mono);
      font-size: .75rem; letter-spacing: 3px; text-transform: uppercase;
      color: var(--accent); margin-bottom: 1rem;
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800; line-height: 1.1;
      letter-spacing: -1.5px;
    }
    .hero h1 .glow { color: var(--accent); text-shadow: 0 0 30px rgba(0,212,255,.5); }
    .hero p {
      margin-top: .9rem; color: var(--muted);
      max-width: 520px; margin-inline: auto; line-height: 1.7;
    }

    /* ── Main Layout ──────────────────────────────────────────────── */
    main {
      position: relative; z-index: 5;
      max-width: 960px; margin: 0 auto; padding: 1rem 1.5rem 4rem;
    }

    /* ── Tabs ─────────────────────────────────────────────────────── */
    .tabs {
      display: flex; gap: .5rem; margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border); padding-bottom: 0;
    }
    .tab-btn {
      background: none; border: none; cursor: pointer;
      font-family: var(--font-ui); font-size: .9rem; font-weight: 600;
      color: var(--muted); padding: .75rem 1.25rem;
      border-bottom: 2px solid transparent;
      transition: all .2s; position: relative; bottom: -1px;
    }
    .tab-btn.active {
      color: var(--accent); border-color: var(--accent);
    }
    .tab-btn:hover:not(.active) { color: var(--text); }

    /* ── Card ─────────────────────────────────────────────────────── */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px; padding: 1.75rem;
      display: none;
    }
    .card.active { display: block; }

    /* ── Inputs ───────────────────────────────────────────────────── */
    .input-group { margin-bottom: 1rem; }
    .input-label {
      display: block; font-size: .8rem; font-weight: 600;
      color: var(--muted); margin-bottom: .5rem;
      letter-spacing: .5px; text-transform: uppercase;
    }

    input[type="text"],
    textarea {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px; padding: .85rem 1rem;
      color: var(--text); font-family: var(--font-mono); font-size: .9rem;
      outline: none; transition: border-color .2s, box-shadow .2s;
      resize: vertical;
    }
    input[type="text"]:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,212,255,.1);
    }
    textarea { min-height: 130px; }

    /* ── Buttons ──────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: .5rem;
      padding: .8rem 1.75rem; border-radius: 10px;
      font-family: var(--font-ui); font-weight: 700; font-size: .9rem;
      cursor: pointer; border: none; transition: all .2s; letter-spacing: .3px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #0095b3);
      color: #050a0f;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,212,255,.3); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .btn-outline {
      background: none; border: 1px solid var(--border); color: var(--muted);
    }
    .btn-outline:hover { border-color: var(--muted); color: var(--text); }

    /* ── Result Panel ─────────────────────────────────────────────── */
    .result-panel {
      margin-top: 1.5rem;
      border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      animation: slideIn .35s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      padding: 1.25rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; flex-wrap: wrap;
    }
    .result-header.safe   { background: rgba(0,255,136,.07); border-bottom: 1px solid rgba(0,255,136,.2); }
    .result-header.danger { background: rgba(255,56,96,.07);  border-bottom: 1px solid rgba(255,56,96,.2);  }
    .result-header.warn   { background: rgba(255,221,87,.07); border-bottom: 1px solid rgba(255,221,87,.2); }

    .verdict {
      display: flex; align-items: center; gap: .75rem;
    }
    .verdict-icon { font-size: 2rem; }
    .verdict-label { font-size: 1.4rem; font-weight: 800; letter-spacing: -.5px; }
    .verdict-label.safe   { color: var(--accent2); }
    .verdict-label.danger { color: var(--danger);  }
    .verdict-label.warn   { color: var(--warn);    }

    /* ── Score Bar ────────────────────────────────────────────────── */
    .score-block { text-align: right; min-width: 120px; }
    .score-label {
      font-size: .7rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: .3rem;
    }
    .score-value { font-size: 2rem; font-weight: 800; font-family: var(--font-mono); }
    .score-value.safe   { color: var(--accent2); }
    .score-value.danger { color: var(--danger);  }
    .score-value.warn   { color: var(--warn);    }

    .bar-wrap {
      background: var(--bg2); border-radius: 4px; height: 6px;
      margin-top: .4rem; overflow: hidden;
    }
    .bar-fill {
      height: 100%; border-radius: 4px;
      transition: width 1s cubic-bezier(.4,0,.2,1);
    }
    .bar-fill.safe   { background: var(--accent2); }
    .bar-fill.danger { background: var(--danger);  }
    .bar-fill.warn   { background: var(--warn);    }

    /* ── Risk Factors ─────────────────────────────────────────────── */
    .result-body { padding: 1.25rem 1.5rem; }

    .section-title {
      font-size: .75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 2px;
      color: var(--muted); margin-bottom: .75rem;
    }
    .factors-list { list-style: none; display: flex; flex-direction: column; gap: .45rem; }
    .factor-item {
      display: flex; align-items: flex-start; gap: .6rem;
      font-size: .87rem; line-height: 1.4;
    }
    .factor-icon { font-size: .85rem; margin-top: .05rem; flex-shrink: 0; }

    .no-factors {
      color: var(--accent2); font-size: .87rem;
      display: flex; align-items: center; gap: .5rem;
    }

    /* ── Feature Grid ─────────────────────────────────────────────── */
    .feat-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: .6rem;
      margin-top: 1.25rem;
    }
    .feat-cell {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: .6rem .75rem;
    }
    .feat-name { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .feat-val  { font-family: var(--font-mono); font-size: .9rem; color: var(--text); margin-top: .15rem; }

    /* ── Divider ──────────────────────────────────────────────────── */
    .divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }

    /* ── Loading Spinner ──────────────────────────────────────────── */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(5,10,15,.4);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ────────────────────────────────────────────────────── */
    .error-box {
      margin-top: 1rem; padding: .85rem 1rem;
      background: rgba(255,56,96,.08); border: 1px solid rgba(255,56,96,.25);
      border-radius: 8px; color: var(--danger); font-size: .87rem;
      display: flex; align-items: center; gap: .5rem;
    }

    /* ── Footer ───────────────────────────────────────────────────── */
    footer {
      position: relative; z-index: 5;
      border-top: 1px solid var(--border);
      padding: 1.25rem 2rem; text-align: center;
      color: var(--muted); font-size: .78rem; font-family: var(--font-mono);
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── Responsive ───────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .result-header { flex-direction: column; align-items: flex-start; }
      .score-block   { text-align: left; }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────── -->
<header>
  <div class="logo">
    <div class="logo-icon">🛡</div>
    Phish<span class="accent">Guard</span>&nbsp;AI
  </div>
  <div class="status-pill">
    <div class="status-dot"></div> SYSTEM ONLINE
  </div>
</header>

<!-- ── Hero ────────────────────────────────────────────────────────────── -->
<div class="hero">
  <div class="hero-tag">// AI-Powered Threat Detection</div>
  <h1>Detect <span class="glow">Phishing</span> &amp; Scams<br>Instantly</h1>
  <p>Machine learning models trained on real-world threat data analyse URLs and messages in real time.</p>
</div>

<!-- ── Main ────────────────────────────────────────────────────────────── -->
<main>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="url">🔗 URL Analyser</button>
    <button class="tab-btn" data-tab="text">📧 Email / Text Scanner</button>
  </div>

  <!-- ── URL Tab ──────────────────────────────────────────────────────── -->
  <div id="tab-url" class="card active">
    <div class="input-group">
      <label class="input-label" for="url-input">Enter URL to inspect</label>
      <input type="text" id="url-input" placeholder="https://example.com/login" autocomplete="off" spellcheck="false" />
    </div>
    <div style="display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;">
      <button class="btn btn-primary" id="url-btn" onclick="analyseURL()">
        <span>Analyse URL</span>
      </button>
      <button class="btn btn-outline" onclick="fillDemo('url')">Load Demo</button>
    </div>
    <div id="url-result"></div>
  </div>

  <!-- ── Text Tab ─────────────────────────────────────────────────────── -->
  <div id="tab-text" class="card">
    <div class="input-group">
      <label class="input-label" for="text-input">Paste email or message content</label>
      <textarea id="text-input" placeholder="Paste the suspicious email or message here…"></textarea>
    </div>
    <div style="display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;">
      <button class="btn btn-primary" id="text-btn" onclick="analyseText()">
        <span>Scan Content</span>
      </button>
      <button class="btn btn-outline" onclick="fillDemo('text')">Load Demo</button>
    </div>
    <div id="text-result"></div>
  </div>

</main>

<!-- ── Footer ───────────────────────────────────────────────────────────── -->
<footer>
  PhishGuard AI &mdash; Built with Python + Flask + scikit-learn &nbsp;|&nbsp;
  <a href="https://github.com/9xm-shivam/phishing-scam-detector" target="_blank">GitHub ↗</a>
  &nbsp;|&nbsp; Shivam Sagore
</footer>


<script>
  /* ── Tab switching ─────────────────────────────────────────────────── */
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn, .card').forEach(el => el.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
    });
  });

  /* ── Demo data ─────────────────────────────────────────────────────── */
  const DEMOS = {
    url:  'http://secure-paypal-login.verify-account.tk/confirm?user=you@email.com',
    text: 'URGENT: Your bank account has been suspended due to unusual activity! Click here IMMEDIATELY to verify your password and account details to avoid permanent closure. Act now — limited time offer! Confirm your social security number to restore access.',
  };
  function fillDemo(type) {
    document.getElementById(`${type}-input`).value = DEMOS[type];
  }

  /* ── Helpers ───────────────────────────────────────────────────────── */
  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    if (loading) {
      btn.disabled = true;
      btn.innerHTML = `<span class="spinner"></span> Analysing…`;
    } else {
      btn.disabled = false;
      btn.innerHTML = btnId === 'url-btn'
        ? '<span>Analyse URL</span>'
        : '<span>Scan Content</span>';
    }
  }

  function scoreClass(score) {
    if (score >= 60) return 'danger';
    if (score >= 30) return 'warn';
    return 'safe';
  }

  function renderResult(containerId, data) {
    const cls   = scoreClass(data.risk_score);
    const icons = { safe: '✅', warn: '⚠️', danger: '🚨' };
    const verbs = { safe: 'Likely Legitimate', warn: 'Suspicious', danger: data.label };

    // Risk factors / signals
    const factorKey = data.risk_factors || data.scam_signals || [];
    let factorsHtml = '';
    if (factorKey.length === 0) {
      factorsHtml = `<div class="no-factors">✅ No significant risk indicators detected.</div>`;
    } else {
      factorsHtml = `<ul class="factors-list">` +
        factorKey.map(f =>
          `<li class="factor-item"><span class="factor-icon">⚡</span> ${f}</li>`
        ).join('') + `</ul>`;
    }

    // Feature cells (URL only)
    let featsHtml = '';
    if (data.features) {
      const f = data.features;
      const cells = [
        ['URL Length',    f.url_length],
        ['Dots',          f.num_dots],
        ['Hyphens',       f.num_hyphens],
        ['Has HTTPS',     f.has_https ? '✔ Yes' : '✘ No'],
        ['Has IP',        f.has_ip    ? '⚠ Yes' : '✔ No'],
        ['Subdomains',    f.subdomain_count],
        ['Entropy',       f.entropy],
        ['Risky TLD',     f.tld_risk  ? '⚠ Yes' : '✔ No'],
      ];
      featsHtml = `
        <hr class="divider" />
        <div class="section-title">Extracted Features</div>
        <div class="feat-grid">
          ${cells.map(([name,val]) =>
            `<div class="feat-cell"><div class="feat-name">${name}</div><div class="feat-val">${val}</div></div>`
          ).join('')}
        </div>`;
    }

    document.getElementById(containerId).innerHTML = `
      <div class="result-panel">
        <div class="result-header ${cls}">
          <div class="verdict">
            <span class="verdict-icon">${icons[cls]}</span>
            <div>
              <div class="verdict-label ${cls}">${verbs[cls]}</div>
              <div style="font-size:.8rem;color:var(--muted);margin-top:.15rem;">
                Confidence: ${data.confidence}%
              </div>
            </div>
          </div>
          <div class="score-block">
            <div class="score-label">Risk Score</div>
            <div class="score-value ${cls}">${data.risk_score}%</div>
            <div class="bar-wrap">
              <div class="bar-fill ${cls}" style="width:0%"
                   data-target="${data.risk_score}"></div>
            </div>
          </div>
        </div>
        <div class="result-body">
          <div class="section-title">${factorKey.length} Risk Indicator${factorKey.length !== 1 ? 's' : ''} Found</div>
          ${factorsHtml}
          ${featsHtml}
        </div>
      </div>`;

    // Animate bar
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        const bar = document.querySelector('.bar-fill[data-target]');
        if (bar) bar.style.width = bar.dataset.target + '%';
      });
    });
  }

  function showError(containerId, msg) {
    document.getElementById(containerId).innerHTML =
      `<div class="error-box">⚠️ ${msg}</div>`;
  }

  /* ── URL Analysis ──────────────────────────────────────────────────── */
  async function analyseURL() {
    const url = document.getElementById('url-input').value.trim();
    if (!url) { showError('url-result', 'Please enter a URL.'); return; }

    setLoading('url-btn', true);
    document.getElementById('url-result').innerHTML = '';

    try {
      const res  = await fetch('/api/check-url', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ url }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      renderResult('url-result', data);
    } catch (e) {
      showError('url-result', e.message || 'Analysis failed. Is the server running?');
    } finally {
      setLoading('url-btn', false);
    }
  }

  /* ── Text Analysis ─────────────────────────────────────────────────── */
  async function analyseText() {
    const text = document.getElementById('text-input').value.trim();
    if (!text) { showError('text-result', 'Please enter some text.'); return; }

    setLoading('text-btn', true);
    document.getElementById('text-result').innerHTML = '';

    try {
      const res  = await fetch('/api/check-text', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ text }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      renderResult('text-result', data);
    } catch (e) {
      showError('text-result', e.message || 'Analysis failed. Is the server running?');
    } finally {
      setLoading('text-btn', false);
    }
  }

  /* ── Enter key submit ──────────────────────────────────────────────── */
  document.getElementById('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') analyseURL();
  });
</script>
</body>
</html>
